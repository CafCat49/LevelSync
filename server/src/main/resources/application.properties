spring.application.name=levelsync
spring.datasource.url=jdbc:postgresql://localhost:5432/lvlsync
spring.datasource.username=postgres
spring.datasource.password=incorrect
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG